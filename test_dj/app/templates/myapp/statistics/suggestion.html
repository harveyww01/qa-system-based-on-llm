<!-- 用户习惯建议页面 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户习惯建议</title>
  {% load static %}
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: "Microsoft Yahei", sans-serif;
      background-color: #f5f6fa;
    }

    .container {
      width: 100%;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    .sidebar {
      width: 200px;
      min-width: 200px;
      background-color: #fff;
      border-right: 1px solid #e0e0e0;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid #e0e0e0;
    }

    .sidebar-title {
      color: #333;
      font-size: 18px;
      font-weight: 600;
    }

    .nav-menu {
      flex: 1;
      padding: 10px 0;
      overflow-y: auto;
    }

    .nav-item {
      display: block;
      padding: 10px 20px;
      color: #666;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .nav-item:hover {
      color: #333;
      background-color: #f5f5f5;
    }

    .nav-item.active {
      color: #fff;
      background-color: #1890ff;
    }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid #e0e0e0;
    }

    .back-btn {
      width: 100%;
      padding: 10px;
      background-color: #fff;
      border: 1px solid #e0e0e0;
      color: #666;
      font-size: 14px;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
    }

    .back-btn:hover {
      color: #1890ff;
      border-color: #1890ff;
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    .content-header {
      padding: 16px 24px;
      background-color: #fff;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .page-title {
      font-size: 18px;
      font-weight: 600;
      color: #333;
      margin: 0;
    }

    .refresh-btn {
      padding: 6px 16px;
      background-color: #1890ff;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .refresh-btn:hover {
      background-color: #40a9ff;
    }

    .content-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .suggestion-section {
      background-color: #fff;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      padding: 16px 20px;
      margin: 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .suggestion-content {
      padding: 20px;
      font-size: 15px;
      line-height: 1.8;
      color: #333;
    }

    .stats-section {
      background-color: #fff;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      padding: 20px;
    }

    .stat-card {
      text-align: center;
      padding: 16px;
      background-color: #fafafa;
      border-radius: 6px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #1890ff;
      margin-bottom: 8px;
    }

    .stat-label {
      font-size: 13px;
      color: #666;
    }

    .model-stats-section {
      background-color: #fff;
      border-radius: 8px;
    }

    .model-stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      padding: 20px;
    }

    .model-card {
      background-color: #fafafa;
      border-radius: 6px;
      padding: 16px;
    }

    .model-name {
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #e8e8e8;
    }

    .model-stat-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .model-stat-label {
      color: #666;
    }

    .model-stat-value {
      color: #333;
      font-weight: 500;
    }

    .mobile-menu-btn {
      display: none;
      position: fixed;
      top: 12px;
      left: 12px;
      width: 44px;
      height: 44px;
      background-color: #fff;
      border: 1px solid #e0e0e0;
      color: #333;
      font-size: 18px;
      cursor: pointer;
      z-index: 1000;
    }

    .mobile-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0,0,0,0.3);
      z-index: 20;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    @media (max-width: 1024px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 768px) {
      .mobile-menu-btn {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .sidebar {
        position: fixed;
        left: -220px;
        top: 0;
        height: 100vh;
        transition: left 0.3s ease;
        z-index: 100;
      }

      .sidebar.show {
        left: 0;
      }

      .content-header {
        padding: 16px 20px;
        padding-left: 68px;
      }

      .content-body {
        padding: 16px;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .model-stats-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <button class="mobile-menu-btn" id="mobileMenuBtn" onclick="toggleMobileMenu()">菜单</button>
  <div class="mobile-overlay" id="mobileOverlay" onclick="toggleMobileMenu()"></div>

  <div class="container">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">统计中心</div>
      </div>

      <div class="nav-menu">
        <a href="/statistics/" class="nav-item">数据概览</a>
        <a href="/statistics/suggestion/" class="nav-item active">用户习惯建议</a>
      </div>

      <div class="sidebar-footer">
        <button class="back-btn" onclick="window.location.href='{% url 'index' %}'">返回对话首页</button>
      </div>
    </div>

    <div class="main-content">
      <div class="content-header">
        <h1 class="page-title">用户习惯建议</h1>
        <button class="refresh-btn" onclick="loadSuggestion()">刷新建议</button>
      </div>

      <div class="content-body">
        <div class="suggestion-section">
          <h3 class="section-title">个性化建议</h3>
          <div class="suggestion-content" id="suggestionContent">
            <div class="loading">加载中...</div>
          </div>
        </div>

        <div class="stats-section">
          <h3 class="section-title">7天使用概况</h3>
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-value" id="totalCalls">-</div>
              <div class="stat-label">总调用次数</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="totalTokens">-</div>
              <div class="stat-label">Token消耗总量</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="avgTtft">-</div>
              <div class="stat-label">平均TTFT</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="modelCount">-</div>
              <div class="stat-label">使用模型数</div>
            </div>
          </div>
        </div>

        <div class="model-stats-section">
          <h3 class="section-title">各模型详细统计</h3>
          <div class="model-stats-grid" id="modelStatsGrid">
            <div class="loading">加载中...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  {% csrf_token %}

  <script>
    function getCsrfToken() {
      return document.querySelector('[name=csrfmiddlewaretoken]').value;
    }

    function toggleMobileMenu() {
      document.getElementById('sidebar').classList.toggle('show');
      document.getElementById('mobileOverlay').classList.toggle('show');
    }

    async function loadSuggestion() {
      try {
        document.getElementById('suggestionContent').innerHTML = '<div class="loading">加载中...</div>';
        document.getElementById('modelStatsGrid').innerHTML = '<div class="loading">加载中...</div>';

        const [suggestResp, prefResp, ttftResp] = await Promise.all([
          fetch("/api/statistics/habit-suggestion/", {
            method: "GET",
            headers: { "X-CSRFToken": getCsrfToken() }
          }),
          fetch("/api/statistics/preference/", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-CSRFToken": getCsrfToken()
            },
            body: JSON.stringify({ time_range: 'week' })
          }),
          fetch("/api/statistics/time/", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-CSRFToken": getCsrfToken()
            },
            body: JSON.stringify({})
          })
        ]);

        const suggestData = await suggestResp.json();
        const prefData = await prefResp.json();
        const ttftData = await ttftResp.json();

        if (suggestData.code === 200) {
          document.getElementById('suggestionContent').textContent = suggestData.data.suggestion || '暂无建议';
          document.getElementById('totalCalls').textContent = suggestData.data.total_calls_7d || 0;
          document.getElementById('totalTokens').textContent = suggestData.data.total_tokens_7d || 0;

          const modelAvgTtft = suggestData.data.model_avg_ttft || {};
          if (Object.keys(modelAvgTtft).length > 0) {
            const avgTtft = Object.values(modelAvgTtft).reduce((a, b) => a + b, 0) / Object.keys(modelAvgTtft).length;
            document.getElementById('avgTtft').textContent = avgTtft.toFixed(2) + 's';
          }

          const modelCount = Object.keys(suggestData.data.model_stats_7d || {}).length;
          document.getElementById('modelCount').textContent = modelCount;
        }

        if (prefData.code === 200) {
          renderModelStats(prefData.data.model_ratio, suggestData.data.model_stats_7d || {}, suggestData.data.model_avg_ttft || {});
        }

      } catch (e) {
        console.error('加载建议失败：', e);
        document.getElementById('suggestionContent').textContent = '加载失败，请稍后重试';
        document.getElementById('modelStatsGrid').innerHTML = '<div class="loading">加载失败</div>';
      }
    }

    function renderModelStats(modelRatio, modelStats7d, modelAvgTtft) {
      const grid = document.getElementById('modelStatsGrid');
      
      if (!modelRatio || modelRatio.length === 0) {
        grid.innerHTML = '<div class="loading">暂无数据</div>';
        return;
      }

      grid.innerHTML = modelRatio.map(item => {
        const stats = modelStats7d[item.model_name] || { calls: 0, tokens: 0 };
        const avgTtft = modelAvgTtft[item.model_name] || 0;
        
        return `
          <div class="model-card">
            <div class="model-name">${item.model_name}</div>
            <div class="model-stat-item">
              <span class="model-stat-label">调用次数</span>
              <span class="model-stat-value">${stats.calls}次</span>
            </div>
            <div class="model-stat-item">
              <span class="model-stat-label">调用占比</span>
              <span class="model-stat-value">${item.percentage}%</span>
            </div>
            <div class="model-stat-item">
              <span class="model-stat-label">Token消耗</span>
              <span class="model-stat-value">${stats.tokens}</span>
            </div>
            <div class="model-stat-item">
              <span class="model-stat-label">平均TTFT</span>
              <span class="model-stat-value">${avgTtft}s</span>
            </div>
          </div>
        `;
      }).join('');
    }

    window.onload = loadSuggestion;
  </script>
</body>
</html>
