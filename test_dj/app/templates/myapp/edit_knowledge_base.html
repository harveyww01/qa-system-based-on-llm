<!-- 编辑知识库页面 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>编辑知识库</title>
  {% load static %}
  <!-- 引入Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: "Microsoft Yahei", sans-serif;
      background-color: #fff;
    }
    .container {
      max-width: 1200px;
      margin: 20px auto;
      padding: 0 20px;
    }
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 15px;
      border-bottom: 1px solid #dee2e6;
    }
    .page-title {
      font-size: 20px;
      font-weight: 600;
      color: #333;
      margin: 0;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-label {
      font-weight: 500;
      margin-bottom: 8px;
      display: block;
      color: #333;
    }
    .form-control {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ced4da;
      border-radius: 4px;
      font-size: 14px;
    }
    .form-control:focus {
      border-color: #6c63ff;
      box-shadow: 0 0 0 0.25rem rgba(108, 99, 255, 0.1);
    }
    .btn-primary {
      background-color: #6c63ff;
      border-color: #6c63ff;
      padding: 8px 20px;
      border-radius: 4px;
      color: white;
      text-decoration: none;
      border: none;
      cursor: pointer;
    }
    .btn-primary:hover {
      background-color: #5a52e0;
    }
    .btn-primary:disabled {
      background-color: #9994e6;
      cursor: not-allowed;
    }
    .btn-secondary {
      background-color: #6c757d;
      border-color: #6c757d;
      padding: 8px 20px;
      border-radius: 4px;
      color: white;
      text-decoration: none;
      border: none;
      cursor: pointer;
      margin-right: 10px;
    }
    .btn-secondary:hover {
      background-color: #5c636a;
    }
    .alert {
      padding: 12px 16px;
      border-radius: 4px;
      margin-bottom: 20px;
      font-size: 14px;
    }
    .alert-error {
      background-color: #f8d7da;
      color: #842029;
      border: 1px solid #f5c2c7;
    }
    /* 新增：文件上传组件样式 */
    .file-upload-group {
      position: relative;
    }
    .file-preview {
      background-color: #f8f9fa;
      border: 1px solid #ced4da;
      border-radius: 4px;
      padding: 12px 16px;
      margin-top: 8px;
      font-size: 14px;
      color: #333;
    }
    .file-preview p {
      margin: 4px 0;
    }
    .form-text {
      font-size: 12px;
      color: #6c757d;
      margin-top: 4px;
      display: block;
    }
    @media (max-width: 768px) {
      .page-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="page-header">
      <h1 class="page-title">编辑知识库</h1>
      <a href="{% url 'knowledge_base' %}" class="btn btn-secondary">返回知识库列表</a>
    </div>

    <!-- 知识库编辑表单 -->
    <form id="editKbForm" method="post" enctype="multipart/form-data">
      <!-- Django CSRF令牌 防止跨站请求伪造，AJAX请求需手动携带 -->
      {% csrf_token %}
      <!-- 知识库名称输入框 -->
      <div class="form-group">
        <label class="form-label" for="kb_name">知识库名称</label>
        <input type="text" class="form-control" id="kb_name" name="kb_name" value="{{ kb.name }}" required>
      </div>

      <!-- 文件上传组件 -->
      <div class="form-group file-upload-group">
        <label class="form-label" for="kb_file">替换知识库文件（支持 .doc/.docx/.md/.txt ）</label>
        <div class="input-group" style="display: flex; gap: 8px; align-items: center;">
          <input type="file" class="form-control" id="kb_file" name="kb_file" accept=".doc,.docx,.md,.txt" style="flex: 1;">
          <button type="button" class="btn btn-secondary" id="clearFileBtn" style="display:none; padding: 10px 14px; flex-shrink: 0;">清空</button>
        </div>
        <span class="form-text">
          上传后将覆盖当前知识库内容，标题保持不变（若需修改标题请手动编辑）
        </span>
        <!-- 文件预览区域 -->
        <div id="filePreview" class="file-preview" style="display:none;"></div>
      </div>

      <!-- 知识库内容文本域 -->
      <div class="form-group">
        <label class="form-label" for="kb_content">知识库内容</label>
        <textarea class="form-control" id="kb_content" name="kb_content" rows="10" required>{{ kb.content }}</textarea>
      </div>

      <!-- 检索配置 -->
      <div class="form-group">
        <label class="form-label" style="font-weight: 600; font-size: 16px; margin-top: 20px;">检索配置</label>
        
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 15px;">
          <div>
            <label class="form-label" style="font-weight: 500;">分段长度</label>
            <input type="number"
                   class="form-control"
                   name="chunk_size"
                   id="chunk_size"
                   min="100"
                   max="1000"
                   step="50"
                   value="{{ kb.chunk_size }}"
            <small class="form-text">文本分段的最大长度，影响检索粒度</small>
          </div>

          <div>
            <label class="form-label" style="font-weight: 500;">重叠长度</label>
            <input type="number"
                   class="form-control"
                   name="chunk_overlap"
                   id="chunk_overlap"
                   min="0"
                   max="100"
                   step="10"
                   value="{{ kb.chunk_overlap }}"
            <small class="form-text">相邻片段的重叠字符数，避免语义断裂</small>
          </div>

          <div>
            <label class="form-label" style="font-weight: 500;">相似度阈值</label>
            <input type="number"
                   class="form-control"
                   name="similarity_threshold"
                   id="similarity_threshold"
                   min="0.1"
                   max="1.0"
                   step="0.1"
                   value="{{ kb.similarity_threshold }}"
            <small class="form-text">低于此值的片段将被过滤，影响召回率</small>
          </div>

          <div>
            <label class="form-label" style="font-weight: 500;">Top-N</label>
            <input type="number"
                   class="form-control"
                   name="top_n"
                   id="top_n"
                   min="1"
                   max="10"
                   step="1"
                   value="{{ kb.top_n }}"
            <small class="form-text">检索时返回的最相似片段数量</small>
          </div>
        </div>
      </div>

      <!-- 保存修改按钮 -->
      <div>
        <button type="submit" class="btn-primary" id="submitBtn">保存修改</button>
      </div>
    </form>
  </div>

  <!-- Bootstrap模态框 -->
  <div class="modal fade" id="messageModal" tabindex="-1" aria-labelledby="messageModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-sm">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="messageModalLabel">提示</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" id="modalMessage"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-primary" data-bs-dismiss="modal">确定</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // 页面DOM加载完成后初始化交互逻辑，避免操作未渲染的DOM元素
    document.addEventListener('DOMContentLoaded', function() {
      // 提前缓存核心DOM元素，减少多次DOM查询，提升性能
      const form = document.getElementById('editKbForm');
      const submitBtn = document.getElementById('submitBtn');
      const kbNameInput = document.getElementById('kb_name');
      const kbContentInput = document.getElementById('kb_content');
      const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

      // 检索配置相关DOM元素
      const chunkSizeInput = document.getElementById('chunk_size');
      const chunkOverlapInput = document.getElementById('chunk_overlap');
      const similarityThresholdInput = document.getElementById('similarity_threshold');
      const topNInput = document.getElementById('top_n');

      // 文件上传相关DOM元素
      const kbFileInput = document.getElementById('kb_file');
      const clearFileBtn = document.getElementById('clearFileBtn');
      const filePreview = document.getElementById('filePreview');

      // 文件选择监听逻辑
      kbFileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        // 验证文件格式
        const allowedTypes = ['.doc', '.docx', '.md', '.txt'];
        const fileExt = file.name.substring(file.name.lastIndexOf('.')).toLowerCase();
        if (!allowedTypes.includes(fileExt)) {
          showModal('错误', '上传失败！文件格式错误');
          kbFileInput.value = '';
          return;
        }

        // 显示文件预览和清空按钮
        filePreview.style.display = 'block';
        filePreview.innerHTML = `
          <p><strong>已选择文件：</strong>${file.name}</p>
          <p><strong>文件大小：</strong>${(file.size / 1024).toFixed(2)} KB</p>
          <p><strong>文件格式：</strong>${fileExt.slice(1).toUpperCase()}</p>
        `;
        clearFileBtn.style.display = 'block';

        // 提示用户无需手动输入内容
        kbContentInput.placeholder = '文件上传后将自动替换内容，无需手动输入...';
        // 临时取消内容必填校验（文件上传时优先使用文件内容）
        kbContentInput.required = false;
      });

      // 清空文件选择逻辑
      clearFileBtn.addEventListener('click', function() {
        kbFileInput.value = '';
        filePreview.style.display = 'none';
        clearFileBtn.style.display = 'none';
        // 恢复内容必填校验
        kbContentInput.required = true;
        kbContentInput.placeholder = '';
      });

      // 绑定表单提交事件，使用AJAX异步提交
      form.addEventListener('submit', async function(e) {
        e.preventDefault(); // 禁用表单原生同步提交行为
        // 禁用按钮防止重复提交，提升用户体验
        submitBtn.disabled = true;
        submitBtn.textContent = '保存中...';

        try {
          const formData = new FormData();
          formData.append('csrfmiddlewaretoken', csrfToken); // 追加CSRF令牌
          formData.append('kb_name', kbNameInput.value.trim()); // 追加知识库名称，去除首尾空格

          // 新增：处理文件上传
          const hasFile = kbFileInput.files.length > 0;
          if (hasFile) {
            // 有文件时，追加文件对象，清空手动输入的内容
            formData.append('kb_file', kbFileInput.files[0]);
            formData.append('kb_content', '');
          } else {
            // 无文件时，使用手动输入的内容
            formData.append('kb_content', kbContentInput.value.trim());
          }

          // 追加检索配置字段
          formData.append('chunk_size', chunkSizeInput.value);
          formData.append('chunk_overlap', chunkOverlapInput.value);
          formData.append('similarity_threshold', similarityThresholdInput.value);
          formData.append('top_n', topNInput.value);

          // 发送AJAX POST请求 提交到当前编辑页面URL
          const response = await fetch(window.location.href, {
            method: 'POST',
            body: formData, // 以FormData格式传递数据（支持文件）
            headers: {
              'X-Requested-With': 'XMLHttpRequest' // 标识为AJAX异步请求，便于后端区分处理
            }
          });

          // 解析后端返回的JSON格式响应结果
          const result = await response.json();
          // 调用通用弹窗函数，展示操作结果
          showModal(result.status === 'success' ? '成功' : '错误', result.message);

          // 操作成功时，监听模态框关闭事件，跳转到知识库首页
          if (result.status === 'success') {
            // { once: true } 确保事件只执行一次，避免多次绑定导致重复跳转
            document.getElementById('messageModal').addEventListener('hidden.bs.modal', function () {
              window.location.href = "{% url 'knowledge_base' %}";
            }, { once: true });
          }
        } catch (error) {
          // 捕获请求异常
          showModal('错误', '提交失败，请检查网络后重试！');
        } finally {
          // 无论请求成功、失败或异常，最终恢复按钮原始状态
          submitBtn.disabled = false;
          submitBtn.textContent = '保存修改';
        }
      });

      // 通用弹窗展示函数
      function showModal(title, message) {
        const modalTitle = document.getElementById('messageModalLabel');
        const modalMessage = document.getElementById('modalMessage');
        modalTitle.textContent = title;
        modalMessage.textContent = message;
        modalTitle.style.color = title === '成功' ? '#198754' : '#dc3545';
        const messageModal = new bootstrap.Modal(document.getElementById('messageModal'));
        messageModal.show();
      }
    });
  </script>
</body>
</html>
