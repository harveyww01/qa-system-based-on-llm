        // 当contextRoundNums为空或当前对话的memory_rounds<=0时，不标记超出记忆轮次
        const isOutOfContext = contextRoundNums.length > 0 && currentChatMemoryRounds > 0 && !contextRoundNums.includes(msg.round_num);
        // 判断是否为用户消息（支持字符串'user'/'1'和数字1）
        const roleNum = parseInt(msg.role);
        const isUserMessage = msg.role === 'user' || roleNum === 1;
        // 判断是否为模型消息（支持字符串'model'/'2'和数字2）
        const isModelMessage = msg.role === 'model' || roleNum === 2;
        
        // 根据当前模式过滤模型消息
        if (isModelMessage && currentCallMode !== 'compare') {
          // 跳过对比模式下的模型消息（对比模式消息只能在对比模式下显示）
          if (msg.call_mode === 'compare') {
            return; // 对比模式的消息不显示在其他模式中
          }
          
          // 根据 call_mode 判断消息来源模式
          if (currentCallMode === 'local' && msg.call_mode === 'cloud') {
            return; // 本地模式：跳过云端模式消息
          }
          if (currentCallMode === 'cloud' && msg.call_mode === 'local') {
            return; // 云端模式：跳过本地模式消息
          }
          if (currentCallMode === 'cloud') {
            // 云端模式：需要匹配云端模型 ID
            // 如果当前没有选择任何云端模型，不显示任何云端模型消息
            if (!selectedCloudModelId) {
              return; // 没有选择云端模型，不显示
            }
            // 如果当前选择了特定云端模型，则只显示该模型的消息
            if (msg.cloud_model_id && msg.cloud_model_id !== selectedCloudModelId) {
              return; // 跳过其他云端模型的消息
            }
          }
        }
        
        // 云端模式下，按轮次和call_mode过滤用户消息
        // 本地模式发送的用户消息不显示在云端模式中，云端模式发送的用户消息正常显示
        if (currentCallMode === 'cloud' && isUserMessage) {
          // 根据call_mode过滤用户消息：云端模式发送的用户消息显示，本地模式发送的用户消息不显示
          if (msg.call_mode && msg.call_mode !== 'cloud') {
            return; // 本地模式或对比模式发送的用户消息，跳过不显示
          }
          // 根据cloud_model_id过滤用户消息：只显示当前选择的云端模型的用户消息
          if (!selectedCloudModelId) {
            return; // 没有选择云端模型，不显示任何用户消息
          }
          if (msg.cloud_model_id && msg.cloud_model_id !== selectedCloudModelId) {
            return; // 用户消息不属于当前选择的云端模型，跳过不显示
          }
        }
        
        // 本地模式下，根据call_mode过滤用户消息
        // 本地模式发送的用户消息显示，云端模式发送的用户消息不显示
        if (currentCallMode === 'local' && isUserMessage) {
          if (msg.call_mode && msg.call_mode !== 'local') {
            return; // 云端模式发送的用户消息，跳过不显示
          }
        }
        
        // 添加超出记忆轮次的样式
        messageDiv.className = `message ${isUserMessage ? 'user-message' : 'model-message'} ${isOutOfContext ? 'out-of-context' : ''}`;
        messageDiv.dataset.msgId = msg.msg_id; // 存储消息ID，供收藏功能使用

        // ========== 新增：消息复选框（批量选择用） ==========
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.className = 'msg-checkbox';
        checkbox.dataset.msgId = msg.msg_id;
        checkbox.addEventListener('click', function(e) {
          e.stopPropagation(); // 防止触发对话切换
          updateBatchSelection(); // 更新选中状态
        });
        messageDiv.appendChild(checkbox);

        const bubbleDiv = document.createElement('div');
        bubbleDiv.className = `message-bubble ${isUserMessage ? 'user-bubble' : 'model-bubble'} ${isOutOfContext ? 'out-of-context-bubble' : ''}`;
        
        // 创建消息文本容器
        const messageTextDiv = document.createElement('div');
        messageTextDiv.className = 'message-text';
        
        // 分别处理模型消息（Markdown渲染）和用户消息（纯文本）
        // 如果是错误消息，使用processErrorMessage处理HTML错误页面
        if (isModelMessage) {
          const isErrorMsg = msg.content.startsWith('错误：') || msg.content.includes('调用失败') || msg.content.includes('404') || msg.content.includes('500');
          if (isErrorMsg) {
            messageTextDiv.innerHTML = processErrorMessage(msg.content);
          } else {
            messageTextDiv.innerHTML = marked.parse(msg.content);
            // 渲染数学公式
            renderMathInElement(messageTextDiv, {
              delimiters: [
                { left: '$$', right: '$$', display: true },
                { left: '$', right: '$', display: false }
              ]
            });
          }
        } else {
          messageTextDiv.textContent = msg.content;
        }
        
        // 创建时间标签
        const timeSpan = document.createElement('span');
        timeSpan.className = 'message-time';
        timeSpan.textContent = msg.time;
        
        // 创建内容容器
        const contentWrapper = document.createElement('div');
        contentWrapper.style.display = 'flex';
        contentWrapper.style.justifyContent = 'space-between';
        contentWrapper.style.alignItems = 'flex-start';
        contentWrapper.appendChild(messageTextDiv);
        
        // 组装气泡内容
        bubbleDiv.appendChild(contentWrapper);
        bubbleDiv.appendChild(timeSpan);

        // 添加性能指标（仅模型消息且有性能数据时）
        if (isModelMessage && msg.performance) {
          const metricsDiv = document.createElement('div');
          metricsDiv.className = 'performance-metrics';
          metricsDiv.innerHTML = `
            <div class="metric-item">
              <span class="metric-label">输出时间:</span>
              <span class="metric-value">${(msg.performance.total_time_ms / 1000).toFixed(2)}s</span>
            </div>
            <div class="metric-item">
              <span class="metric-label">TTFT:</span>
              <span class="metric-value">${(msg.performance.ttft_ms / 1000).toFixed(2)}s</span>
            </div>
            <div class="metric-item">
              <span class="metric-label">Token数:</span>
              <span class="metric-value">${msg.performance.token_count}</span>
            </div>
          `;
          bubbleDiv.appendChild(metricsDiv);
        }

        // 添加超出记忆轮次标签
        if (isOutOfContext) {
          const contextTag = document.createElement('span');
          contextTag.className = 'context-tag';
          contextTag.textContent = '超出记忆轮次';
          bubbleDiv.appendChild(contextTag);
        }

        if (isUserMessage) {
          const userAvatar = document.createElement('img');
          userAvatar.src = "{{ avatar_url }}";
          userAvatar.onerror = function() {
            this.src = "{% static 'images/avatar-default.jpg' %}";
          };
          userAvatar.alt = "用户";
          userAvatar.className = "user-avatar";
          messageDiv.appendChild(userAvatar);
        } else if (isModelMessage) {
          const modelAvatar = document.createElement('img');
          modelAvatar.src = "{% static 'images/assistant_avatar/qwen-avatar.jpg' %}";
          modelAvatar.alt = "Qwen";
          modelAvatar.className = "model-avatar";
          messageDiv.appendChild(modelAvatar);
        }

        messageDiv.appendChild(bubbleDiv);
        chatContent.appendChild(messageDiv);

        // 消息hover时显示收藏按钮
        messageDiv.addEventListener('mouseenter', function() {
          const collectBtn = this.querySelector('.collect-btn');
          if (collectBtn) collectBtn.style.display = 'inline-block';
        });
        messageDiv.addEventListener('mouseleave', function() {
          const collectBtn = this.querySelector('.collect-btn');
          if (collectBtn) collectBtn.style.display = 'none';
        });

        // 消息点击选中/取消选中（除收藏按钮和复选框外）
        messageDiv.addEventListener('click', function(e) {
          if (e.target.closest('.collect-btn') || e.target.closest('.msg-checkbox')) return;
          const checkbox = this.querySelector('.msg-checkbox');
          checkbox.checked = !checkbox.checked;
          updateBatchSelection();
        });
      });

      // initMessageCollectButtons(); // 初始化单条收藏按钮
      initBatchOperationEvents(); // 初始化批量操作事件

      chatContent.scrollTop = chatContent.scrollHeight;
    }

    /**
     * 发送消息
     */
    async function sendMessage() {

      const inputElem = document.getElementById('chatInput');
      const content = inputElem.value.trim();
      if (!content) return;

      // 初始化两个列表
      if (!chatHistory[currentChatId]) chatHistory[currentChatId] = [];
      if (!contextHistory[currentChatId]) contextHistory[currentChatId] = [];

      const currentTime = getCurrentTime();
      const selectedKbId = document.getElementById('kbSelect').value;
      const currentConfig = getModelConfig();

      // 1. 添加用户消息到展示列表
      const userMsg = { role: 'user', content, time: currentTime, round_num: 1, msg_id: `temp_${Date.now()}_user`, call_mode: currentCallMode };
      chatHistory[currentChatId].push(userMsg);
      updateHistoryItem(content, currentTime);
      // 对比模式下不调用renderChatContent，使用专门的用户消息渲染
      if (currentCallMode !== 'compare') {
        renderChatContent();
      } else {
        // 对比模式：单独渲染用户消息
        renderUserMessageForCompare(content, currentTime);
      }
      inputElem.value = '';

      // 保存用户消息到数据库（传入当前调用模式和模型名称）
      // 云端模式下需要传入selectedCloudModelId，用于后续消息过滤
      const cloudModelIdForSave = currentCallMode === 'cloud' ? selectedCloudModelId : null;
      const saveResp = await saveMessageToDB(currentChatId, 'user', content, currentTime, null, cloudModelIdForSave, null, currentCallMode, getCurrentModelName());
      if (saveResp.code !== 200) {
        alert('消息保存失败：' + saveResp.msg);
        chatHistory[currentChatId].pop();
        renderChatContent();
        return;
      }
      // 更新用户消息的真实轮次（从后端返回）
      userMsg.round_num = saveResp.data.current_round;
      userMsg.msg_id = saveResp.data.msg_id;


      // 2. 根据模式调用模型获取回复
      let modelReply = '';
      let modelResponse = null;
      
      // 对比模式：并行调用两个独立接口
      if (currentCallMode === 'compare') {
        console.log('=== [调试] 对比模式：并行调用本地和云端模型接口 ===');
        
        // 并行发起两个API调用
        const [localResponse, cloudResponse] = await Promise.all([
          callLocalModelAPI(content, currentConfig, selectedKbId, 'compare'),
          callCloudModelAPI(content, currentConfig, selectedKbId, selectedCloudModelId, 'compare')
        ]);
        
        console.log('=== [调试] 本地模型响应:', localResponse);
        console.log('=== [调试] 云端模型响应:', cloudResponse);
        
        // 组合结果
        modelResponse = {
          code: 200,
          data: {
            local: localResponse.code === 200 ? localResponse.data.local : null,
            cloud: cloudResponse.code === 200 ? cloudResponse.data.cloud : null
          }
        };
        
        // 记录错误信息
        if (localResponse.code !== 200) {
          console.error('本地模型调用失败:', localResponse.msg);
        }
        if (cloudResponse.code !== 200) {
          console.error('云端模型调用失败:', cloudResponse.msg);
        }
      } else {
        // 非对比模式：使用原有逻辑
        modelResponse = await callMultiModelAPI(content, currentConfig, selectedKbId);
      }
      
      if (modelResponse.code === 200) {
        const data = modelResponse.data;
        
        // 对比模式下的处理逻辑（无论成功或失败都使用对比模式布局）
        if (currentCallMode === 'compare') {
          // 准备本地模型结果（处理失败情况）
          const localResult = data.local || { result: '模型调用失败', total_time_ms: 0, ttft_ms: 0, token_count: 0 };
          const cloudResult = data.cloud || { result: '模型调用失败', total_time_ms: 0, ttft_ms: 0, token_count: 0, model_name: selectedCloudModelId };
          
          // 保存本地模型消息到chatHistory（即使失败也保存）
          const localMsg = {
            role: 'model',
            content: localResult.result,
            time: getCurrentTime(),
            round_num: saveResp.data.current_round,
            msg_id: `temp_${Date.now()}_model_local`,
            model_type: 'local',
            cloud_model_id: null,
            performance: {
              total_time_ms: localResult.total_time_ms,
              ttft_ms: localResult.ttft_ms,
              token_count: localResult.token_count
            }
          };
          chatHistory[currentChatId].push(localMsg);
          if (data.local) {
            const localSaveResp = await saveMessageToDB(currentChatId, 'model', localResult.result, getCurrentTime(), 'local', null, localMsg.performance, 'compare', 'qwen3-4b-lora-fp8');
            if (localSaveResp.code === 200) {
              localMsg.msg_id = localSaveResp.data.msg_id;
            }
          }
          
          // 保存云端模型消息到chatHistory（即使失败也保存）
          const cloudMsg = {
            role: 'model',
            content: cloudResult.result,
            time: getCurrentTime(),
            round_num: saveResp.data.current_round,
            msg_id: `temp_${Date.now()}_model_cloud`,
            model_type: 'cloud',
            cloud_model_id: data.cloud ? (data.cloud.cloud_model_id || selectedCloudModelId) : selectedCloudModelId,
            model_name: cloudResult.model_name,
            performance: {
              total_time_ms: cloudResult.total_time_ms,
              ttft_ms: cloudResult.ttft_ms,
              token_count: cloudResult.token_count
            }
          };
          chatHistory[currentChatId].push(cloudMsg);
          if (data.cloud) {
            const cloudSaveResp = await saveMessageToDB(currentChatId, 'model', cloudResult.result, getCurrentTime(), 'cloud', cloudMsg.cloud_model_id, cloudMsg.performance, 'compare', cloudMsg.model_name || selectedCloudModelId);
            if (cloudSaveResp.code === 200) {
              cloudMsg.msg_id = cloudSaveResp.data.msg_id;
            }
          }
          
          // 渲染对比模式布局（即使部分失败也渲染）
          renderCompareModeResult(localResult, cloudResult);
          modelReply = localResult.result;
        } else if (currentCallMode === 'cloud' && data.cloud) {
          renderSingleModelResult(data.cloud, data.cloud.model_name || '云端模型');
          modelReply = data.cloud.result;
        } else if (data.local) {
          renderSingleModelResult(data.local, 'Qwen3-4B-FP8');
          modelReply = data.local.result;
        } else {
          modelReply = '模型调用失败';
          const chatContent = document.getElementById('chatContent');
          const errorDiv = document.createElement('div');
          errorDiv.className = 'message model-message';
          errorDiv.innerHTML = `
            <div class="message-bubble model-bubble">
              <div class="message-text">${modelReply}</div>
            </div>
          `;
          chatContent.appendChild(errorDiv);
        }
      } else {
        modelReply = modelResponse.msg || '模型调用失败';
        const chatContent = document.getElementById('chatContent');
        const errorDiv = document.createElement('div');
        errorDiv.className = 'message model-message';
        errorDiv.innerHTML = `
          <div class="message-bubble model-bubble">
            <div class="message-text">${escapeHtml(modelReply)}</div>
          </div>
        `;
        chatContent.appendChild(errorDiv);
      }

      // 3. 添加模型消息到展示列表（非对比模式）
      if (currentCallMode !== 'compare') {
        let modelPerformance = null;
        if (modelResponse.code === 200 && modelResponse.data) {
          const respData = modelResponse.data;
          if (respData.local) {
            modelPerformance = {
              total_time_ms: respData.local.total_time_ms,
              ttft_ms: respData.local.ttft_ms,
              token_count: respData.local.token_count
            };
          } else if (respData.cloud) {
            modelPerformance = {
              total_time_ms: respData.cloud.total_time_ms,
              ttft_ms: respData.cloud.ttft_ms,
              token_count: respData.cloud.token_count
            };
          }
        }
        const modelMsg = {
          role: 'model',
          content: modelReply,
          time: getCurrentTime(),
          round_num: saveResp.data.current_round,
          msg_id: `temp_${Date.now()}_model`,
          model_type: currentCallMode === 'cloud' ? 'cloud' : 'local',
          cloud_model_id: currentCallMode === 'cloud' ? (modelResponse.data && modelResponse.data.cloud ? modelResponse.data.cloud.cloud_model_id : selectedCloudModelId) : null,
          performance: modelPerformance
        };
        chatHistory[currentChatId].push(modelMsg);

        // 保存模型消息到数据库
        // 根据当前模式确定model_type和cloud_model_id
        let modelTypeForSave = 'local';
        let cloudModelIdForSave = null;
        if (currentCallMode === 'cloud' && modelResponse.data && modelResponse.data.cloud) {
          modelTypeForSave = 'cloud';
          cloudModelIdForSave = modelResponse.data.cloud.cloud_model_id || selectedCloudModelId;
        }
        const modelNameForSave = currentCallMode === 'cloud' ? (modelResponse.data && modelResponse.data.cloud ? modelResponse.data.cloud.model_name : getCurrentModelName()) : 'qwen3-4b-lora-fp8';
        const modelSaveResp = await saveMessageToDB(currentChatId, 'model', modelReply, getCurrentTime(), modelTypeForSave, cloudModelIdForSave, modelMsg.performance, currentCallMode, modelNameForSave);
        if (modelSaveResp.code === 200) {
          modelMsg.msg_id = modelSaveResp.data.msg_id;
        }
      }

      // 4. 刷新上下文列表（按当前模式和记忆轮次过滤）
      const backendMemoryRounds = saveResp.data.memory_rounds;
      currentChatMemoryRounds = backendMemoryRounds;  // 更新当前对话的记忆轮数
      contextHistory[currentChatId] = filterMessagesByMemoryRounds(
        chatHistory[currentChatId],
        backendMemoryRounds,
        currentCallMode,
        selectedCloudModelId
      );

      // 新话题提示逻辑（使用后端返回的memory_rounds判断）
      const { new_topic_triggered, memory_rounds } = saveResp.data;
      if (new_topic_triggered && saveResp.data.current_round > memory_rounds && !newTopicTriggered) {
        newTopicTriggered = true;
        document.getElementById('newTopicNotice').classList.add('show');
        setTimeout(() => {
          document.getElementById('newTopicNotice').classList.remove('show');
        }, 3000);
      } else if (!new_topic_triggered) {
        newTopicTriggered = false;
      }

      // 重新渲染（展示所有消息）
      // 对比模式下不调用renderChatContent，以保留分栏布局
      if (currentCallMode !== 'compare') {
        renderChatContent();
      }
    }

    // ========== 收藏功能前端逻辑 ==========
    /**
     * 初始化收藏按钮：加载时检查每个对话的收藏状态，绑定点击事件
     */
    // ========== 修复：消息收藏功能前端逻辑（替换原对话收藏逻辑） ==========
    async function initCollectButtons() {
      const collectBtns = document.querySelectorAll('.collect-btn');
      for (const btn of collectBtns) {
        const msgId = btn.dataset.msgId;
        if (!msgId) continue;

        // 检查该消息是否已收藏（调用消息收藏接口）
        try {
          const resp = await fetch("{% url 'check_message_collected' %}", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-CSRFToken": getCsrfToken()
            },
            body: JSON.stringify({ msg_id: msgId })
          });
          const data = await resp.json();
          if (data.code === 200 && data.data.collected) {
            btn.classList.remove('fa-star-o');
            btn.classList.add('fa-star', 'collected'); // 已收藏：实心黄星
          }
        } catch (e) {
          console.error(`检查消息${msgId}收藏状态失败：`, e);
        }

        // 绑定单条收藏/取消收藏事件（调用消息收藏接口）
        btn.addEventListener('click', async function(e) {
          e.stopPropagation(); // 阻止事件冒泡
          const msgId = this.dataset.msgId;
          const isCollected = this.classList.contains('collected');

          if (isCollected) {
            // 取消收藏：调用消息取消收藏接口
            const resp = await fetch("{% url 'cancel_collect_message' %}", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": getCsrfToken()
              },
              body: JSON.stringify({ msg_id: msgId })
            });
            const data = await resp.json();
            if (data.code === 200) {
              this.classList.remove('fa-star', 'collected');
              this.classList.add('fa-star-o');
              alert('取消收藏成功！');
            } else {
              alert('取消收藏失败：' + data.msg);
            }
          } else {
            // 收藏：调用消息收藏接口
            const resp = await fetch("{% url 'collect_message' %}", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": getCsrfToken()
              },
              body: JSON.stringify({ msg_id: msgId })
            });
            const data = await resp.json();
            if (data.code === 200) {
              this.classList.remove('fa-star-o');
              this.classList.add('fa-star', 'collected');
              alert('收藏成功！可在「我的收藏」中查看');
            } else {
              alert('收藏失败：' + data.msg);
            }
          }
        });
      }
    }

    // ========== 新增：批量收藏核心逻辑 ==========
    let selectedMsgIds = new Set(); // 存储选中的消息ID

    /**
     * 初始化批量操作事件（全选/批量收藏/批量取消）
     */
    function initBatchOperationEvents() {
      const batchBar = document.getElementById('batchOperationBar');
      const selectAllCheckbox = document.getElementById('selectAllCheckbox');
      const batchCollectBtn = document.getElementById('batchCollectBtn');
      const batchCancelCollectBtn = document.getElementById('batchCancelCollectBtn');
      const batchCount = document.getElementById('batchCount').querySelector('span');

      // 全选/取消全选
      selectAllCheckbox.addEventListener('click', function(e) {
        e.stopPropagation();
        const isChecked = this.checked;
        const allCheckboxes = document.querySelectorAll('.msg-checkbox[data-msg-id]');

        selectedMsgIds.clear();
        allCheckboxes.forEach(checkbox => {
          checkbox.checked = isChecked;
          const msgId = checkbox.dataset.msgId;
          if (isChecked) {
            selectedMsgIds.add(msgId);
            checkbox.closest('.message').classList.add('selected');
          } else {
            checkbox.closest('.message').classList.remove('selected');
          }
        });

        // 更新计数和批量栏显示
        batchCount.textContent = selectedMsgIds.size;
        batchBar.classList.toggle('show', selectedMsgIds.size > 0);
      });

      // 初始化单条按钮
      function initMessageCollectButtons(){
        console.log('初始化单条按钮')
      }

      // 批量收藏
      batchCollectBtn.addEventListener('click', async function() {
      console.log(selectedMsgIds)
        if (selectedMsgIds.size === 0) {
          alert('请先选择要收藏的消息');
          return;
        }

        // 过滤有效消息ID（排除临时ID，仅保留后端返回的真实ID）

            method: "POST",
            headers: {

              "X-CSRFToken": getCsrfToken()

          });

            // 清空选中状态

    /**

    function updateBatchSelection() {
      const batchBar = document.getElementById('batchOperationBar');
      const batchCount = document.getElementById('batchCount').querySelector('span');
      const allCheckboxes = document.querySelectorAll('.msg-checkbox[data-msg-id]');
      const selectAllCheckbox = document.getElementById('selectAllCheckbox');

      // 重置选中ID集合
      selectedMsgIds.clear();
      allCheckboxes.forEach(checkbox => {
        const msgId = checkbox.dataset.msgId;
        if (checkbox.checked) {
          selectedMsgIds.add(msgId);
          checkbox.closest('.message').classList.add('selected');
        } else {
          checkbox.closest('.message').classList.remove('selected');
        }
      });

      // 更新计数和批量栏
      batchCount.textContent = selectedMsgIds.size;
      batchBar.classList.toggle('show', selectedMsgIds.size > 0);

      // 更新全选框状态
      const isAllChecked = selectedMsgIds.size > 0 && selectedMsgIds.size === allCheckboxes.length;
      selectAllCheckbox.checked = isAllChecked;
    }

    /**
     * 清空批量选择状态
     */
    function clearBatchSelection() {
      const batchBar = document.getElementById('batchOperationBar');
      const batchCount = document.getElementById('batchCount').querySelector('span');
      const allCheckboxes = document.querySelectorAll('.msg-checkbox[data-msg-id]');
      const selectAllCheckbox = document.getElementById('selectAllCheckbox');

      // 取消所有复选框
      allCheckboxes.forEach(checkbox => {
        checkbox.checked = false;
        checkbox.closest('.message').classList.remove('selected');
      });

      // 清空选中ID
      selectedMsgIds.clear();

      // 更新UI
      batchCount.textContent = 0;
      batchBar.classList.remove('show');
      selectAllCheckbox.checked = false;
    }

    document.getElementById('historyList').addEventListener('click', async function(e) {
      const historyItem = e.target.closest('.history-item');
      if (!historyItem) return;

      // 切换激活状态
      document.querySelectorAll('.history-item').forEach(item => item.classList.remove('active'));
      historyItem.classList.add('active');
      const targetChatId = historyItem.dataset.chatId;

      // 更新当前对话ID
      currentChatId = targetChatId;

      // 首先从数据库加载消息（总是重新加载，确保获取最新的模型信息）
      await loadChatMessagesFromDB(targetChatId);
      console.log("加载后的消息id:", targetChatId);
      
      // 获取最新消息的模型信息
      const messages = chatHistory[targetChatId] || [];
      console.log("加载后的消息:", messages);
      if (messages.length > 0) {
        // 找到最后一条模型消息（包含模型信息）
        // 注意：消息的role可能是'model'或数字'2'，需要同时匹配
        let lastAssistantMsg = null;
        for (let i = messages.length - 1; i >= 0; i--) {
          const msgRole = parseInt(messages[i].role);
          if ((messages[i].role === '2' || msgRole === 2) && messages[i].call_mode) {
            lastAssistantMsg = messages[i];
            break;
          }
        }
        console.log("最后一条模型消息:", lastAssistantMsg);
        
        // 如果没有找到模型消息，使用最后一条消息的信息
        if (!lastAssistantMsg) {
          lastAssistantMsg = messages[messages.length - 1];
        }

        // 获取模式和模型ID
        const msgCallMode = lastAssistantMsg?.call_mode || 'local';
        const msgCloudModelId = lastAssistantMsg?.cloud_model_id || null;

        // 更新地址栏
        const url = new URL(window.location);
        url.searchParams.set('chat_id', targetChatId);
        url.searchParams.set('mode', msgCallMode);
        
        if (msgCloudModelId && (msgCallMode === 'cloud' || msgCallMode === 'compare')) {
          url.searchParams.set('model', msgCloudModelId);
        } else {
          url.searchParams.delete('model');
        }
        history.replaceState(null, '', url.toString());

        // 切换到对应的模型模式
        if (msgCallMode !== currentCallMode) {
          setCallMode(msgCallMode);
        }

        // 如果是云端模式，自动选择对应的模型
        if ((msgCallMode === 'cloud' || msgCallMode === 'compare') && msgCloudModelId) {
          const select = document.getElementById('cloudModelSelect');
          // 尝试在下拉框中找到匹配的模型
          for (let i = 0; i < select.options.length; i++) {
            const option = select.options[i];
            if (option.value === msgCloudModelId || option.value.includes(msgCloudModelId) || 
                option.textContent.includes(msgCloudModelId)) {
              select.value = option.value;
              selectedCloudModelId = option.value;
              select.dispatchEvent(new Event('change'));
              break;
            }
          }
        }
      } else {
        // 如果没有消息，更新地址栏为基本状态
        const url = new URL(window.location);
        url.searchParams.set('chat_id', targetChatId);
        url.searchParams.delete('mode');
        url.searchParams.delete('model');
        history.replaceState(null, '', url.toString());
      }

      // 渲染对话内容
      renderChatContent();
    });

    let recorder = null;

    let audioContext = null;
    const recordBtn = document.getElementById('recordBtn');
    const stopRecordBtn = document.getElementById('stopRecordBtn');
    const chatInput = document.getElementById('chatInput');

    /**
     * 重置录音状态
     */
    function resetRecorder() {
      if (recorder) {
        try { recorder.clear(); } catch (e) {}
        recorder = null;
      }
      if (audioStream) {
        audioStream.getTracks().forEach(track => track.stop());
        audioStream = null;
      }
      if (audioContext) {
        try { audioContext.close(); } catch (e) {}
        audioContext = null;
      }
    }

    /**
     * 初始化录音
     */
    async function initRecorder() {
      try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          throw new Error('你的浏览器不支持录音功能，请升级到最新版本！');
        }
        audioStream = await navigator.mediaDevices.getUserMedia({
          audio: {
            sampleRate: 16000,
            channelCount: 1,
            sampleSize: 16,
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
          }
        });
        const AudioContextConstructor = window.AudioContext || window.webkitAudioContext;
        audioContext = new AudioContextConstructor({ sampleRate: 16000 });
        if (audioContext.state === 'suspended') {
          await audioContext.resume();
        }
        const source = audioContext.createMediaStreamSource(audioStream);
        recorder = new Recorder(source, {
          workerPath: "{% static 'js/recorder/recorderWorker.js' %}",
          sampleRate: 16000,
          numChannels: 1,
          bitRate: 16
        });
        console.log('录音初始化成功！');
      } catch (err) {
        let errorMsg = '';
        switch(err.name) {
          case 'NotAllowedError':
            errorMsg = '麦克风权限被拒绝！请在浏览器设置中允许麦克风权限。';
            break;
          case 'NotFoundError':
            errorMsg = '未检测到麦克风设备！请检查设备连接。';
            break;
          case 'NotReadableError':
            errorMsg = '麦克风被其他应用占用！请关闭其他录音软件。';
            break;
          case 'ReferenceError':
            errorMsg = 'Recorder库未加载！请检查recorder.js文件路径。';
            break;
          default:
            errorMsg = `录音初始化失败：${err.message}`;
        }
        alert(errorMsg);
        console.error('录音初始化失败：', err);
        resetRecorder();
      }
    }

            console.log(`│ 识别耗时: ${mdtime} ms`);
            console.log(`└─────────────────────────────────────────────────────────────┘`);
            console.log("\n【识别结果】:");
            console.log(`${recognizeText}`);
            console.log("\n" + "=".repeat(80));
            console.log("               【流程结束】               ");
            console.log("=".repeat(80) + "\n");
          } else {
            throw new Error(response.data.msg || '识别失败，无返回结果。');
          }
        });
      } catch (err) {
        let errorMsg = '';
        if (err.response) {
          errorMsg = `识别失败：${err.response.data.msg || '接口返回错误'}`;
        } else if (err.request) {
          errorMsg = '网络错误！请检查后端服务是否启动，或API Key是否正确。';
        } else {
          errorMsg = `识别失败：${err.message}`;
        }
        alert(errorMsg);
        console.error('语音识别失败：', err);
        chatInput.placeholder = '输入问题...';
      } finally {
        resetRecorder();
      }
    });
  </script>
</body>
</html>
